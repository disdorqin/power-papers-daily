<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SOTA Papers Daily - 最新顶会 SOTA 论文聚合">
    <title>SOTA Papers Daily - 顶会前沿论文</title>
    <link rel="icon" type="image/png" href="assets/logo2-removebg-preview.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/sota.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="header-left">
                    <a href="https://github.com/disdorqin/research-claw" target="_blank" class="github-button">
                        <svg height="20" width="20" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                        </svg>
                        <span class="github-text">GitHub</span>
                    </a>
                </div>
                
                <div class="header-center">
                    <a href="sota.html" class="site-logo">
                        <img src="assets/logo2-removebg-preview.png" alt="SOTA Papers Daily Logo" class="logo-image">
                        <span class="site-title">SOTA Papers Daily</span>
                    </a>
                </div>
                
                <div class="header-controls">
                    <a href="index.html" class="icon-button" title="返回每日论文">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 19l-7-7m0 0l7-7m0 0H21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </a>
                    <a href="statistic.html" class="icon-button" title="统计">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </a>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="sota-intro">
                <h2>🔥 最新顶会 SOTA 论文</h2>
                <p>聚合 CVPR/ICCV/ECCV/NeurIPS/ICML/ICLR 等顶会最新 SOTA 论文，仅收录有开源代码的前沿研究</p>
                <div class="filter-tags">
                    <span class="filter-tag active" data-filter="all">全部</span>
                    <span class="filter-tag" data-filter="cv">计算机视觉</span>
                    <span class="filter-tag" data-filter="ml">机器学习</span>
                    <span class="filter-tag" data-filter="time-series">时序预测</span>
                    <span class="filter-tag" data-filter="power">电力预测</span>
                </div>
            </div>

            <div id="paperContainer" class="paper-container">
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <p>Loading SOTA papers...</p>
                </div>
            </div>

            <div id="pagination" class="pagination">
                <button id="prevPage" class="page-btn" disabled>← 上一页</button>
                <span id="pageInfo" class="page-info">第 1 页</span>
                <button id="nextPage" class="page-btn">下一页 →</button>
            </div>
        </main>

        <footer>
            <p>Powered by <a href="https://github.com/disdorqin/research-claw" target="_blank">ResearchClaw</a> | 
               Data from <a href="https://github.com/amusi/CVPR2026-Papers-with-Code" target="_blank">CVPR2026-Papers-with-Code</a> & arXiv</p>
        </footer>
    </div>

    <script src="js/sota-app.js"></script>
</body>
</html>
