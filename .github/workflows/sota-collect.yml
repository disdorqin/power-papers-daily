name: SOTA Papers Daily

on:
  schedule:
    - cron: "0 2 * * *"  # 每天 UTC 2:00 (北京时间 10:00)
  workflow_dispatch:  # 允许手动触发

jobs:
  collect-sota:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        uv sync
        
    - name: Collect SOTA papers
      id: collect_step
      run: |
        source .venv/bin/activate
        
        echo "开始收集 SOTA 论文... / Starting to collect SOTA papers..."
        
        # 运行 SOTA 论文收集脚本
        python collect_sota_papers.py
        
        echo "✅ SOTA 论文收集完成 / SOTA papers collection completed"
        
    - name: AI Enhancement
      if: steps.collect_step.outcome == 'success'
      run: |
        source .venv/bin/activate
        
        export OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
        export OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}
        export MODEL_NAME=${{ vars.MODEL_NAME }}
        export LANGUAGE=${{ vars.LANGUAGE }}
        export TOKEN_GITHUB=${{ secrets.TOKEN_GITHUB }}
        
        echo "开始 AI 增强处理... / Starting AI enhancement..."
        
        # 运行 AI 增强脚本
        python -m ai.enhance_sota --data data/sota_papers.jsonl --max_workers 3 --language ${LANGUAGE:-Chinese}
        
        echo "✅ AI 增强处理完成 / AI enhancement completed"
        
    - name: Commit and push changes
      if: steps.collect_step.outcome == 'success'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add data/
        git diff --staged --quiet || git commit -m "🤖 Update SOTA papers - $(date -u '+%Y-%m-%d %H:%M UTC')"
        git push
        
    - name: Deploy to GitHub Pages
      if: steps.collect_step.outcome == 'success'
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        publish_branch: gh-pages